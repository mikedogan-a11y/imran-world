<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#7ec8ff" />
<title>Imran's World</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; background: #7ec8ff;
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  #scene { position: fixed; inset: 0; display: block; touch-action: none; }

  /* ---- Start screen ---- */
  #start {
    position: fixed; inset: 0; z-index: 20;
    background: radial-gradient(120% 120% at 50% 20%, #9ad6ff 0%, #5fb0f0 55%, #3f8fd6 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; transition: opacity .5s ease;
  }
  #start h1 {
    font-size: clamp(38px, 11vw, 84px); margin: 0; letter-spacing: 1px;
    text-shadow: 0 4px 0 rgba(0,0,0,.18), 0 8px 22px rgba(0,0,0,.25);
  }
  #start p { font-size: clamp(16px, 4.5vw, 24px); margin: 10px 0 32px; opacity: .95; }
  #playBtn {
    border: none; border-radius: 28px; padding: 22px 54px;
    font-size: clamp(24px, 7vw, 40px); font-weight: 800; color: #fff;
    background: linear-gradient(180deg, #ffce54, #ff9f1c);
    box-shadow: 0 8px 0 #d97e00, 0 12px 26px rgba(0,0,0,.3);
    cursor: pointer;
  }
  #playBtn:active { transform: translateY(5px); box-shadow: 0 3px 0 #d97e00; }

  /* ---- Buttons ---- */
  .corner {
    position: fixed; width: 64px; height: 64px; border: 4px solid #fff;
    border-radius: 18px; font-size: 28px; line-height: 1; color: #333; background:#fff;
    box-shadow: 0 4px 0 rgba(0,0,0,.18), 0 6px 16px rgba(0,0,0,.18);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: transform .07s ease; z-index: 10;
  }
  .corner:active { transform: translateY(3px); }
  .corner.active { background:#ffe082; border-color:#222; transform: translateY(-4px) scale(1.06); }

  #buildBtn { left: 14px; top: calc(14px + env(safe-area-inset-top,0px)); }
  #walkBtn  { left: 14px; top: calc(88px + env(safe-area-inset-top,0px)); }
  #resetBtn { right: 14px; top: calc(14px + env(safe-area-inset-top,0px)); background:#ff7043; color:#fff; }
  #resetBtn.armed { background:#e53935; animation: wob .4s infinite alternate; }
  @keyframes wob { from { transform: rotate(-5deg);} to { transform: rotate(5deg);} }

  /* ---- Bottom tool bar (build mode) ---- */
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom,0px));
    display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: nowrap;
    background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.85) 40%);
    transition: opacity .25s ease, transform .25s ease; z-index: 10;
  }
  #bar.gone { opacity: 0; transform: translateY(120%); pointer-events: none; }
  .swatch {
    width: 54px; height: 54px; border-radius: 16px; border: 4px solid #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,.18), 0 5px 14px rgba(0,0,0,.18); cursor: pointer; flex: 0 0 auto;
    transition: transform .08s ease;
  }
  .swatch:active { transform: translateY(3px); }
  .swatch.active { border-color: #222; transform: translateY(-6px) scale(1.08); }
  .tool {
    width: 62px; height: 62px; border-radius: 18px; border: 4px solid #fff; background:#fff; color:#333;
    font-size: 28px; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 0 rgba(0,0,0,.18), 0 5px 14px rgba(0,0,0,.18); cursor:pointer; flex:0 0 auto;
    transition: transform .08s ease;
  }
  .tool:active { transform: translateY(3px); }
  #eraseBtn.active { background:#ffe082; border-color:#222; transform: translateY(-6px) scale(1.06); }

  #hint {
    position: fixed; top: 16%; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.55); color:#fff; padding: 12px 22px; border-radius: 999px;
    font-size: 18px; font-weight: 600; pointer-events: none; transition: opacity 1s ease;
    text-align:center; z-index: 9; max-width: 90vw;
  }
  .hidden { opacity: 0 !important; }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- start screen -->
  <div id="start">
    <h1>Imran's World</h1>
    <p>Build blocks • Walk around • Say hi to your family 💛</p>
    <button id="playBtn">▶ Play</button>
  </div>

  <!-- mode + reset -->
  <button id="buildBtn" class="corner active" aria-label="Build mode">🔨</button>
  <button id="walkBtn"  class="corner" aria-label="Walk mode">🏃</button>
  <button id="resetBtn" class="corner" aria-label="Start over">🗑️</button>

  <div id="hint">👆 Tap the ground to build!<br>✌️ Drag a finger to look around</div>

  <!-- build tools -->
  <div id="bar">
    <button id="eraseBtn" class="tool" aria-label="Eraser">🧽</button>
    <button id="surpriseBtn" class="tool" aria-label="Surprise">🎉</button>
  </div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   Imran's World — a free, no-purchase sandbox for little kids.
   • BUILD mode: tap to place blocks, drag to look, pinch to zoom.
   • WALK mode : tap the ground and Imran walks there. Walk up to
     Baran, Anne or Baba and they wave, hop and send a heart.
   Nothing can be bought, lost, or broken. Saves to this device.
   ============================================================ */

const CELL = 1;
const COLORS = [0xff5252,0xff9800,0xffd600,0x66bb6a,0x29b6f6,0x5c6bc0,0xab47bc,0xffffff];
let activeColor = COLORS[3];
let eraseMode = false;
let mode = 'build';            // 'build' | 'walk'

// ---- renderer / scene / camera ----------------------------
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8ff);
scene.fog = new THREE.Fog(0x7ec8ff, 30, 75);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
const target = new THREE.Vector3(0, 0.6, 0);   // camera look-at
let theta = Math.PI * 0.5, phi = Math.PI * 0.34, radius = 15;
function applyCamera() {
  phi = Math.max(0.18, Math.min(Math.PI * 0.49, phi));
  radius = Math.max(6, Math.min(38, radius));
  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.cos(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.sin(theta));
  camera.lookAt(target);
}

// ---- lights / ground --------------------------------------
scene.add(new THREE.HemisphereLight(0xffffff, 0x88aa66, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 1.05);
sun.position.set(10, 18, 8); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -24; sun.shadow.camera.right = 24;
sun.shadow.camera.top = 24; sun.shadow.camera.bottom = -24;
scene.add(sun);

const GROUND = 40;
const ground = new THREE.Mesh(new THREE.PlaneGeometry(GROUND, GROUND),
  new THREE.MeshLambertMaterial({ color: 0x8bd06a }));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; ground.name = 'ground';
scene.add(ground);
const grid = new THREE.GridHelper(GROUND, GROUND, 0x6fb558, 0x7cbf63);
grid.position.y = 0.01; grid.material.opacity = 0.35; grid.material.transparent = true;
scene.add(grid);

// ===========================================================
//  CHARACTERS (blocky family figures, made of boxes)
// ===========================================================
function box(w, h, d, color) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color }));
}
// builds a little person; feet sit at y = 0. Faces +Z.
function makeCharacter({ skin, shirt, pants, hair, height = 1, extra }) {
  const g = new THREE.Group();
  const legH = 0.45, bodyH = 0.55, headS = 0.5;

  // legs (each in a hip pivot so they can swing)
  const hips = [];
  for (const sx of [-0.13, 0.13]) {
    const hip = new THREE.Group();
    hip.position.set(sx, legH, 0);
    const leg = box(0.2, legH, 0.2, pants); leg.position.y = -legH / 2;
    hip.add(leg); g.add(hip); hips.push(hip);
  }
  // body
  const body = box(0.55, bodyH, 0.32, shirt);
  body.position.y = legH + bodyH / 2; g.add(body);
  // arms (shoulder pivots)
  const shoulders = [];
  for (const sx of [-0.36, 0.36]) {
    const sh = new THREE.Group();
    sh.position.set(sx, legH + bodyH - 0.05, 0);
    const arm = box(0.16, 0.5, 0.16, shirt); arm.position.y = -0.22;
    const hand = box(0.17, 0.13, 0.17, skin); hand.position.y = -0.5;
    sh.add(arm); sh.add(hand); g.add(sh); shoulders.push(sh);
  }
  // head + hair + face
  const headY = legH + bodyH + headS / 2;
  const head = box(headS, headS, headS, skin); head.position.y = headY; g.add(head);
  const hairM = box(headS + 0.04, 0.16, headS + 0.04, hair);
  hairM.position.y = headY + headS / 2 - 0.05; g.add(hairM);
  // eyes (on +Z face)
  for (const ex of [-0.11, 0.11]) {
    const white = box(0.1, 0.12, 0.04, 0xffffff);
    white.position.set(ex, headY + 0.03, headS / 2); g.add(white);
    const pupil = box(0.05, 0.06, 0.03, 0x222222);
    pupil.position.set(ex, headY + 0.02, headS / 2 + 0.02); g.add(pupil);
  }
  // smile
  const smile = box(0.2, 0.05, 0.03, 0x7a3b2e);
  smile.position.set(0, headY - 0.13, headS / 2); g.add(smile);
  if (extra) extra(g, { headY, headS });

  g.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  g.scale.setScalar(height);
  g.userData = { hips, shoulders, walk: 0, baseY: 0, bob: Math.random() * 6, lastGreet: -9999, hop: 0 };
  return g;
}

// floating name tag above a character
function makeLabel(text, bg = '#3f51b5') {
  const c = document.createElement('canvas'); c.width = 256; c.height = 96;
  const x = c.getContext('2d');
  x.fillStyle = bg; roundRect(x, 8, 18, 240, 60, 26); x.fill();
  x.fillStyle = '#fff'; x.font = 'bold 46px system-ui, sans-serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(text, 128, 50);
  const tex = new THREE.CanvasTexture(c); tex.anisotropy = 4;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sp.scale.set(1.5, 0.56, 1); sp.renderOrder = 999;
  return sp;
}
function roundRect(x, a, b, w, h, r) {
  x.beginPath(); x.moveTo(a + r, b);
  x.arcTo(a + w, b, a + w, b + h, r); x.arcTo(a + w, b + h, a, b + h, r);
  x.arcTo(a, b + h, a, b, r); x.arcTo(a, b, a + w, b, r); x.closePath();
}

// place a character in the world with a name tag
const family = [];
function placeCharacter(opts, x, z, name, tagColor, isPlayer = false) {
  const ch = makeCharacter(opts);
  ch.position.set(x, 0, z);
  scene.add(ch);
  const top = (0.45 + 0.55 + 0.5) * (opts.height || 1) + 0.45;
  const label = makeLabel(name, tagColor);
  label.position.set(0, top, 0);
  ch.add(label);
  const rec = { group: ch, name, isPlayer, target: null };
  if (isPlayer) player = rec; else family.push(rec);
  return rec;
}

let player = null;

// Imran — the kid you control (bright blue shirt, yellow cap)
const imran = placeCharacter({
  skin: 0xf0c08a, shirt: 0x2196f3, pants: 0x1b3a6b, hair: 0x3a2a1a, height: 0.92,
  extra: (g, { headY, headS }) => {                 // little yellow cap so "you" stand out
    const cap = box(headS + 0.06, 0.12, headS + 0.06, 0xffd600);
    cap.position.y = headY + headS / 2 + 0.02; g.add(cap);
    const peak = box(headS + 0.04, 0.06, 0.18, 0xffd600);
    peak.position.set(0, headY + headS / 2 - 0.02, headS / 2 + 0.12); g.add(peak);
  }
}, 0, 4.5, 'Imran', '#1976d2', true);
imran.group.rotation.y = Math.PI;                   // face the house

// Baran — brother (green shirt)
placeCharacter({ skin: 0xf0c08a, shirt: 0x43a047, pants: 0x2e4d2e, hair: 0x2a1c12, height: 0.9 },
  3.5, 3, 'Baran', '#2e7d32');
// Anne — mum (taller, purple dress + long hair)
placeCharacter({ skin: 0xf3c79a, shirt: 0xab47bc, pants: 0x6a1b9a, hair: 0x1c1c1c, height: 1.05,
  extra: (g, { headY, headS }) => {
    const hair2 = box(headS + 0.06, 0.4, 0.18, 0x1c1c1c);   // long hair at back
    hair2.position.set(0, headY - 0.1, -headS / 2 - 0.02); g.add(hair2);
  }}, -3.5, 3, 'Anne', '#8e24aa');
// Baba — dad (tallest, orange shirt, moustache)
placeCharacter({ skin: 0xe7b07d, shirt: 0xff7043, pants: 0x37474f, hair: 0x1a1a1a, height: 1.15,
  extra: (g, { headY, headS }) => {
    const mo = box(0.26, 0.06, 0.04, 0x1a1a1a);
    mo.position.set(0, headY - 0.06, headS / 2 + 0.01); g.add(mo);
  }}, -3.5, -2, 'Baba', '#e64a19');

// ---- a little pet puppy that follows Imran ----------------
function makePet() {
  const g = new THREE.Group();
  const fur = 0x9b6a43, dark = 0x6d4c2f;
  const body = box(0.42, 0.3, 0.8, fur); body.position.set(0, 0.42, 0); g.add(body);
  const legs = [];                                   // [back-L, front-L, back-R, front-R]
  for (const sx of [-0.14, 0.14]) for (const sz of [-0.28, 0.28]) {
    const hip = new THREE.Group(); hip.position.set(sx, 0.3, sz);
    const leg = box(0.12, 0.3, 0.12, dark); leg.position.y = -0.15; hip.add(leg);
    g.add(hip); legs.push(hip);
  }
  const hy = 0.62;
  g.add(Object.assign(box(0.34, 0.32, 0.32, fur), { position: new THREE.Vector3(0, hy, 0.45) }));
  g.add(Object.assign(box(0.16, 0.14, 0.16, dark), { position: new THREE.Vector3(0, hy - 0.04, 0.62) }));
  for (const sx of [-0.12, 0.12]) g.add(Object.assign(box(0.1, 0.16, 0.06, dark), { position: new THREE.Vector3(sx, hy + 0.2, 0.4) }));
  for (const sx of [-0.08, 0.08]) g.add(Object.assign(box(0.05, 0.06, 0.04, 0x222222), { position: new THREE.Vector3(sx, hy + 0.04, 0.61) }));
  const tail = new THREE.Group(); tail.position.set(0, 0.5, -0.4); tail.rotation.x = -0.7;
  tail.add(Object.assign(box(0.08, 0.3, 0.08, fur), { position: new THREE.Vector3(0, 0.12, 0) }));
  g.add(tail);
  g.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  g.scale.setScalar(0.7);
  g.userData = { legs, tail, walk: 0, hop: 0 };
  return g;
}
const pet = makePet(); pet.position.set(1.4, 0, 5.5); scene.add(pet);

function updatePet(dt) {
  const u = pet.userData;
  tmp.copy(player.group.position).sub(pet.position); tmp.y = 0;
  const dist = tmp.length(); let moving = false;
  if (dist > 1.3) {
    moving = true;
    const step = Math.min(3.0 * dt, dist - 1.1); tmp.normalize();
    pet.position.addScaledVector(tmp, step);
    pet.rotation.y = Math.atan2(tmp.x, tmp.z);
  }
  u.walk += dt * (moving ? 12 : 5);
  const sw = moving ? Math.sin(u.walk) * 0.6 : 0;
  u.legs[0].rotation.x = sw; u.legs[3].rotation.x = sw;
  u.legs[1].rotation.x = -sw; u.legs[2].rotation.x = -sw;
  u.tail.rotation.y = Math.sin(u.walk * 1.4) * 0.55;          // happy wag
  let y = 0;
  if (u.hop > 0) { u.hop += dt; const p = u.hop / 0.5; if (p >= 1) u.hop = 0; else y = Math.sin(p * Math.PI) * 0.35; }
  pet.position.y = y;
}

// ===========================================================
//  BLOCKS
// ===========================================================
const cubeGeo = new THREE.BoxGeometry(CELL, CELL, CELL);
const blocks = new Map();
const key = (x, y, z) => `${x},${y},${z}`;
const popping = [];

function addBlock(cx, cy, cz, color, save = true) {
  if (cy < 0) return;
  const k = key(cx, cy, cz); if (blocks.has(k)) return;
  const m = new THREE.Mesh(cubeGeo, new THREE.MeshLambertMaterial({ color }));
  m.position.set(cx + 0.5, cy + 0.5, cz + 0.5);
  m.castShadow = true; m.receiveShadow = true; m.userData.cell = [cx, cy, cz];
  scene.add(m); blocks.set(k, m);
  m.scale.setScalar(0.1); popping.push({ m, t: 0 });
  if (save) scheduleSave();
}
function removeBlock(cx, cy, cz) {
  const k = key(cx, cy, cz); const m = blocks.get(k); if (!m) return;
  scene.remove(m); m.material.dispose(); blocks.delete(k); scheduleSave();
}
function updatePops(dt) {
  for (let i = popping.length - 1; i >= 0; i--) {
    const p = popping[i]; p.t += dt * 6;
    const s = p.t >= 1 ? 1 : 1 - Math.pow(1 - p.t, 3);
    p.m.scale.setScalar(0.1 + 0.9 * s);
    if (p.t >= 1) { p.m.scale.setScalar(1); popping.splice(i, 1); }
  }
}

// ===========================================================
//  PICKING / TAP
// ===========================================================
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function pickAt(cx, cy, list) {
  const r = canvas.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(list, true);
  return hits.length ? hits[0] : null;
}
function handleTap(cx, cy) {
  if (mode === 'walk') {
    const hit = pickAt(cx, cy, [ground, ...blocks.values()]);
    if (!hit) return;
    player.target = new THREE.Vector3(
      Math.max(-GROUND/2+1, Math.min(GROUND/2-1, hit.point.x)), 0,
      Math.max(-GROUND/2+1, Math.min(GROUND/2-1, hit.point.z)));
    tone(500, 0.08, 'sine', 0.08);
    return;
  }
  // build mode
  const hit = pickAt(cx, cy, [ground, ...blocks.values()]);
  if (!hit) return;
  let obj = hit.object;
  if (obj.name === 'ground') {
    if (eraseMode) return;
    const bx = Math.floor(hit.point.x), bz = Math.floor(hit.point.z);
    if (Math.abs(bx) > GROUND/2 || Math.abs(bz) > GROUND/2) return;
    addBlock(bx, 0, bz, activeColor); blip(true); return;
  }
  while (obj && !obj.userData.cell) obj = obj.parent;   // safety
  if (!obj) return;
  const [bx, by, bz] = obj.userData.cell;
  if (eraseMode) { removeBlock(bx, by, bz); blip(false); return; }
  const n = hit.face.normal;
  addBlock(bx + n.x, by + n.y, bz + n.z, activeColor); blip(true);
}

// ===========================================================
//  MOVEMENT + GREETINGS
// ===========================================================
const floaties = [];
function spawnFloat(pos, emoji) {
  const c = document.createElement('canvas'); c.width = c.height = 96;
  const x = c.getContext('2d'); x.font = '72px serif';
  x.textAlign = 'center'; x.textBaseline = 'middle'; x.fillText(emoji, 48, 52);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial(
    { map: new THREE.CanvasTexture(c), depthTest: false }));
  sp.scale.set(0.7, 0.7, 1); sp.position.copy(pos); sp.renderOrder = 1000;
  scene.add(sp); floaties.push({ sp, t: 0 });
}
function updateFloaties(dt) {
  for (let i = floaties.length - 1; i >= 0; i--) {
    const f = floaties[i]; f.t += dt;
    f.sp.position.y += dt * 0.9; f.sp.material.opacity = Math.max(0, 1 - f.t / 1.4);
    if (f.t > 1.4) { scene.remove(f.sp); floaties.splice(i, 1); }
  }
}

const tmp = new THREE.Vector3();
function animateLegs(rec, dt, walking) {
  const u = rec.group.userData;
  if (walking) {
    u.walk += dt * 9;
    const swing = Math.sin(u.walk) * 0.6;
    u.hips[0].rotation.x = swing; u.hips[1].rotation.x = -swing;
    u.shoulders[0].rotation.x = -swing; u.shoulders[1].rotation.x = swing;
  } else {                                   // ease limbs back to standing
    u.hips[0].rotation.x *= 0.8; u.hips[1].rotation.x *= 0.8;
    u.shoulders[0].rotation.x *= 0.8; u.shoulders[1].rotation.x *= 0.8;
  }
}

function updatePlayer(dt, now) {
  const u = player.group.userData;
  let walking = false;
  if (player.target) {
    tmp.copy(player.target).sub(player.group.position); tmp.y = 0;
    const dist = tmp.length();
    if (dist > 0.06) {
      walking = true;
      const step = Math.min(2.6 * dt, dist);
      tmp.normalize();
      player.group.position.addScaledVector(tmp, step);
      player.group.rotation.y = Math.atan2(tmp.x, tmp.z);
    } else player.target = null;
  }
  animateLegs(player, dt, walking);

  // greetings
  for (const f of family) {
    const d = f.group.position.distanceTo(player.group.position);
    if (d < 2.1 && now - f.group.userData.lastGreet > 3500) {
      f.group.userData.lastGreet = now;
      f.group.userData.hop = 0.001;
      f.group.rotation.y = Math.atan2(                       // turn to face Imran
        player.group.position.x - f.group.position.x,
        player.group.position.z - f.group.position.z);
      tmp.copy(f.group.position); tmp.y = 1.9;
      spawnFloat(tmp, '❤️'); chime();
      pet.userData.hop = 0.001; bark();           // puppy joins the hello
    }
  }
}

function updateFamily(dt, t) {
  for (const f of family) {
    const u = f.group.userData;
    let y = Math.sin(t * 2 + u.bob) * 0.03;                  // gentle idle bob
    if (u.hop > 0) {                                         // happy hop on greeting
      u.hop += dt;
      const p = u.hop / 0.6;
      if (p >= 1) u.hop = 0; else { y += Math.sin(p * Math.PI) * 0.5;
        u.shoulders[0].rotation.x = Math.sin(p * Math.PI) * -1.6;   // wave!
        u.shoulders[1].rotation.x = Math.sin(p * Math.PI) * -1.6; }
    } else { u.shoulders[0].rotation.x *= 0.85; u.shoulders[1].rotation.x *= 0.85; }
    f.group.position.y = y;
  }
}

// ===========================================================
//  INPUT (tap vs drag vs pinch)
// ===========================================================
const pointers = new Map();
let downPos = null, downTime = 0, moved = false, pinchStart = 0, pinchRadius = 0;
canvas.addEventListener('pointerdown', (e) => {
  ensureAudio(); canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1) { downPos = { x: e.clientX, y: e.clientY }; downTime = performance.now(); moved = false; }
  else if (pointers.size === 2) { const [a, b] = [...pointers.values()];
    pinchStart = Math.hypot(a.x - b.x, a.y - b.y); pinchRadius = radius; }
  fadeHint();
});
canvas.addEventListener('pointermove', (e) => {
  const p = pointers.get(e.pointerId); if (!p) return;
  const px = e.clientX, py = e.clientY;
  if (pointers.size === 2) {
    pointers.set(e.pointerId, { x: px, y: py });
    const [a, b] = [...pointers.values()];
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    if (pinchStart > 0) { radius = pinchRadius * (pinchStart / dist); applyCamera(); }
    moved = true; return;
  }
  if (Math.abs(px - downPos.x) + Math.abs(py - downPos.y) > 8) moved = true;
  theta -= (px - p.x) * 0.008; phi -= (py - p.y) * 0.008; applyCamera();
  pointers.set(e.pointerId, { x: px, y: py });
});
function endPointer(e) {
  const wasOne = pointers.size === 1; pointers.delete(e.pointerId);
  if (wasOne && !moved && performance.now() - downTime < 400) handleTap(e.clientX, e.clientY);
  if (pointers.size < 2) pinchStart = 0;
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

// ===========================================================
//  SOUND
// ===========================================================
let audio = null;
function ensureAudio() { if (audio) return;
  try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) { audio = null; } }
function tone(freq, dur, type = 'sine', gain = 0.18) {
  if (!audio) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(gain, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + dur);
  o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + dur);
}
function blip(up) { up ? (tone(523,0.12,'square',0.12), tone(784,0.10,'sine',0.08)) : tone(300,0.12,'sawtooth',0.10); }
function chime() { [659,988].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'triangle',0.13), i*90)); }
function bark() { tone(190,0.07,'square',0.12); setTimeout(()=>tone(150,0.09,'square',0.12), 110); }
function fanfare() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'triangle',0.14), i*90)); }

// ===========================================================
//  UI
// ===========================================================
const bar = document.getElementById('bar');
const eraseBtn = document.getElementById('eraseBtn');
const buildBtn = document.getElementById('buildBtn');
const walkBtn = document.getElementById('walkBtn');
const hintEl = document.getElementById('hint');
const swatchEls = [];
COLORS.forEach((c) => {
  const s = document.createElement('button'); s.className = 'swatch';
  s.style.background = '#' + c.toString(16).padStart(6, '0');
  if (c === activeColor) s.classList.add('active');
  s.addEventListener('click', () => {
    activeColor = c; eraseMode = false; eraseBtn.classList.remove('active');
    swatchEls.forEach(el => el.classList.remove('active')); s.classList.add('active');
    tone(660, 0.08, 'sine', 0.1);
  });
  bar.insertBefore(s, document.getElementById('surpriseBtn')); swatchEls.push(s);
});
eraseBtn.addEventListener('click', () => {
  eraseMode = !eraseMode; eraseBtn.classList.toggle('active', eraseMode);
  if (eraseMode) swatchEls.forEach(el => el.classList.remove('active'));
  tone(eraseMode ? 220 : 440, 0.1, 'sine', 0.1);
});
document.getElementById('surpriseBtn').addEventListener('click', () => {
  fanfare();
  const cx = Math.round((Math.random() - 0.5) * 8), cz = Math.round((Math.random() - 0.5) * 8);
  const h = 4 + Math.floor(Math.random() * 4);
  for (let y = 0; y < h; y++) setTimeout(() => addBlock(cx, y, cz, COLORS[y % COLORS.length]), y * 110);
});

function setMode(m) {
  mode = m;
  buildBtn.classList.toggle('active', m === 'build');
  walkBtn.classList.toggle('active', m === 'walk');
  bar.classList.toggle('gone', m !== 'build');
  hintEl.classList.remove('hidden');
  hintEl.innerHTML = m === 'build'
    ? '👆 Tap the ground to build!<br>✌️ Drag a finger to look around'
    : '👟 Tap where Imran should walk!<br>Walk up to your family 💛';
  hintFaded = false; setTimeout(fadeHint, 4500);
  tone(m === 'build' ? 500 : 700, 0.1, 'sine', 0.1);
}
buildBtn.addEventListener('click', () => setMode('build'));
walkBtn.addEventListener('click', () => setMode('walk'));

// reset (two taps)
let armed = false, armTimer = null;
const resetBtn = document.getElementById('resetBtn');
resetBtn.addEventListener('click', () => {
  if (!armed) { armed = true; resetBtn.classList.add('armed'); resetBtn.textContent = '✓?';
    tone(330, 0.1, 'sine', 0.1);
    armTimer = setTimeout(() => { armed = false; resetBtn.classList.remove('armed'); resetBtn.textContent = '🗑️'; }, 2200);
    return; }
  clearTimeout(armTimer); armed = false; resetBtn.classList.remove('armed'); resetBtn.textContent = '🗑️';
  for (const m of blocks.values()) { scene.remove(m); m.material.dispose(); }
  blocks.clear(); scheduleSave(); tone(200, 0.25, 'sawtooth', 0.12);
});

// start screen
document.getElementById('playBtn').addEventListener('click', () => {
  ensureAudio(); fanfare();
  const s = document.getElementById('start'); s.style.opacity = '0';
  setTimeout(() => s.remove(), 500);
});

let hintFaded = false;
function fadeHint() { if (hintFaded) return; hintFaded = true; hintEl.classList.add('hidden'); }
setTimeout(fadeHint, 6500);

// ===========================================================
//  SAVE / LOAD (blocks only)
// ===========================================================
const SAVE_KEY = 'imransWorld.v1';
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const data = [];
    for (const m of blocks.values()) data.push([...m.userData.cell, m.material.color.getHex()]);
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (_) {}
  }, 400);
}
function load() {
  let data = null;
  try { data = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch (_) {}
  if (Array.isArray(data) && data.length) { data.forEach(([x, y, z, c]) => addBlock(x, y, z, c, false)); return; }
  // starter house so it's never empty
  const wall = 0xffcc80, roof = 0xff7043, door = 0x6d4c41;
  for (let x = -1; x <= 1; x++) for (let z = -1; z <= 1; z++) {
    if (x === 0 && z === 0) continue;
    addBlock(x, 0, z, wall, false); addBlock(x, 1, z, wall, false);
  }
  addBlock(0, 0, 1, door, false);
  for (let x = -1; x <= 1; x++) for (let z = -1; z <= 1; z++) addBlock(x, 2, z, roof, false);
}

// ===========================================================
//  RESIZE + LOOP
// ===========================================================
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  const t = now / 1000;
  updatePops(dt); updateFamily(dt, t); updatePlayer(dt, now); updatePet(dt); updateFloaties(dt);

  // camera target: follow Imran while walking, else gently centre
  const want = mode === 'walk'
    ? tmp.set(player.group.position.x, 0.7, player.group.position.z)
    : tmp.set(0, 0.6, 0);
  target.lerp(want, 0.08); applyCamera();

  renderer.render(scene, camera); requestAnimationFrame(loop);
}

// ---- go ----
resize(); applyCamera(); load(); setMode('build');
requestAnimationFrame(loop);
</script>
